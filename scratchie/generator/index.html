<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Scratchie — Match-3 Prototype</title>
	<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
	<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
	<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin></script>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		html, body { margin: 0; min-height: 100%; background: #1c1c22; }
		#status { color: #ccc; font: 16px/1.4 system-ui, sans-serif; padding: 24px; }
	</style>
</head>
<body>
	<div id="root"><div id="status">Loading prototype…</div></div>
	<script>
		// Load the .jsx source at runtime, transpile with Babel, and render — so the
		// .jsx file stays the single source of truth (edit it, refresh, done).
		fetch("scratchie-match3-prototype.jsx")
			.then(function (r) { if (!r.ok) throw new Error("fetch " + r.status); return r.text(); })
			.then(function (src) {
				// Rewrite module syntax for in-browser (no bundler): react named imports
				// become destructures off the React global; drop the default export.
				src = src.replace(/import\s*\{([^}]*)\}\s*from\s*["']react["'];?/, "const {$1} = React;");
				src = src.replace(/export\s+default\s+function/, "function");
				src = src.replace(/export\s+default\s+/, "");
				var js = Babel.transform(src, { presets: ["react"] }).code;
				(0, eval)(js);  // defines ScratchiePrototype in global scope
				ReactDOM.createRoot(document.getElementById("root"))
					.render(React.createElement(ScratchiePrototype));
			})
			.catch(function (e) {
				document.getElementById("status").textContent = "Failed to load: " + e.message;
			});
	</script>
</body>
</html>
